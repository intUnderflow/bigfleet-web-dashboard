image:
  repository: ghcr.io/intunderflow/bigfleet-web-dashboard
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

# Wiring into a BigFleet install. Each may be left empty to disable that data source;
# the dashboard surfaces "unwired" indicators in the UI rather than failing to start.
prometheusUrl: ""
coordinatorAddr: ""
grafanaUrl: ""

# mTLS for dialing the coordinator (ADR-0048 / ADR-0060). Mount a Secret
# holding the dashboard's client certificate — which should carry the
# bigfleet://readonly URI SAN so it can read but never mutate the fleet — its
# private key, and the CA bundle, then set the filenames below. Leave
# secretName empty to dial the coordinator in plaintext (dev / zero-config).
coordinatorTLS:
  secretName: ""
  mountPath: "/etc/bigfleet-web-dashboard/tls"
  certFile: "tls.crt"
  keyFile: "tls.key"
  caFile: "ca.crt"

# Kubeconfig for managed clusters. Mount a Secret as a file and set the path here.
kubeconfig:
  secretName: ""
  path: "/etc/bigfleet-web-dashboard/kubeconfig"

# Optional oauth2-proxy auth sidecar (roadmap v0.3). A read-only dashboard
# still should not be open to the world; front it with oauth2-proxy. When
# enabled, the Service targets the proxy, which authenticates and forwards to
# the dashboard on localhost (so the dashboard can't be reached un-proxied).
# Put OAUTH2_PROXY_* env (client id/secret, cookie secret) in the secret and
# the provider/issuer/email-domain flags in extraArgs.
auth:
  enabled: false
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
  secretName: ""
  port: 4180
  extraArgs: []
  # - --provider=oidc
  # - --oidc-issuer-url=https://accounts.google.com
  # - --email-domain=example.com

# The image runs as nonroot (uid 65532, distroless static). The dashboard
# writes nothing to disk — the SPA is embedded — so the root filesystem is
# read-only.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  # - host: bigfleet.example.com
  #   paths:
  #     - path: /
  #       pathType: Prefix
  tls: []
  # - secretName: bigfleet-web-dashboard-tls
  #   hosts: [bigfleet.example.com]
