apiVersion: v1
kind: Service
metadata:
  name: {{ include "bigfleet-web-dashboard.fullname" . }}
  labels:
    {{- include "bigfleet-web-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "bigfleet-web-dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      # When the auth sidecar is enabled, the Service targets the proxy so the
      # dashboard cannot be reached un-authenticated (roadmap v0.3).
      targetPort: {{ if .Values.auth.enabled }}proxy{{ else }}http{{ end }}
      protocol: TCP
