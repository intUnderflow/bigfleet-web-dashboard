apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-web-dashboard.fullname" . }}
  labels:
    {{- include "bigfleet-web-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bigfleet-web-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-web-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "bigfleet-web-dashboard.fullname" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bigfleet-web-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --listen=:8080
            {{- with .Values.prometheusUrl }}
            - --prometheus-url={{ . }}
            {{- end }}
            {{- with .Values.coordinatorAddr }}
            - --coordinator-addr={{ . }}
            {{- end }}
            {{- if .Values.coordinatorTLS.secretName }}
            - --tls-cert={{ .Values.coordinatorTLS.mountPath }}/{{ .Values.coordinatorTLS.certFile }}
            - --tls-key={{ .Values.coordinatorTLS.mountPath }}/{{ .Values.coordinatorTLS.keyFile }}
            - --tls-ca={{ .Values.coordinatorTLS.mountPath }}/{{ .Values.coordinatorTLS.caFile }}
            {{- end }}
            {{- with .Values.grafanaUrl }}
            - --grafana-url={{ . }}
            {{- end }}
            {{- if .Values.kubeconfig.secretName }}
            - --kubeconfig={{ .Values.kubeconfig.path }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.kubeconfig.secretName .Values.coordinatorTLS.secretName }}
          volumeMounts:
            {{- if .Values.kubeconfig.secretName }}
            - name: kubeconfig
              mountPath: {{ dir .Values.kubeconfig.path }}
              readOnly: true
            {{- end }}
            {{- if .Values.coordinatorTLS.secretName }}
            - name: coordinator-tls
              mountPath: {{ .Values.coordinatorTLS.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
        {{- if .Values.auth.enabled }}
        # oauth2-proxy sidecar (ADR-0048 posture / roadmap v0.3): a read-only
        # dashboard still should not be open to the world. The proxy fronts
        # the Service port and forwards authenticated requests to the
        # dashboard on localhost. Configure the OIDC provider via the
        # referenced secret (OAUTH2_PROXY_* env) + extraArgs.
        - name: oauth2-proxy
          image: {{ .Values.auth.image }}
          args:
            - --http-address=0.0.0.0:{{ .Values.auth.port }}
            - --upstream=http://127.0.0.1:8080
            - --reverse-proxy=true
            {{- range .Values.auth.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- if .Values.auth.secretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.auth.secretName }}
          {{- end }}
          ports:
            - name: proxy
              containerPort: {{ .Values.auth.port }}
              protocol: TCP
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if or .Values.kubeconfig.secretName .Values.coordinatorTLS.secretName }}
      volumes:
        {{- if .Values.kubeconfig.secretName }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.secretName }}
        {{- end }}
        {{- if .Values.coordinatorTLS.secretName }}
        - name: coordinator-tls
          secret:
            secretName: {{ .Values.coordinatorTLS.secretName }}
        {{- end }}
      {{- end }}
