run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - errorlint
    - nilerr
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/intUnderflow/bigfleet-web-dashboard
  revive:
    rules:
      - name: package-comments
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
