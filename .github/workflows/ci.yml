name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: go build + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bigfleet-web-dashboard
      # go.mod has `replace github.com/intUnderflow/bigfleet => ../bigfleet`
      # so the in-tree proto + grpcutil packages must resolve from a sibling
      # checkout. Pull bigfleet@main alongside the dashboard.
      - uses: actions/checkout@v4
        with:
          repository: intUnderflow/bigfleet
          path: bigfleet
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bigfleet-web-dashboard/go.sum
      - working-directory: bigfleet-web-dashboard
        run: go mod download
      - working-directory: bigfleet-web-dashboard
        run: go build ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          working-directory: bigfleet-web-dashboard
      - working-directory: bigfleet-web-dashboard
        run: go test -race ./...

  ui:
    name: ui typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - working-directory: ui
        run: npm ci || npm install
      - working-directory: ui
        run: npm run typecheck
      - working-directory: ui
        run: npm run build

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0
      - run: helm lint deploy/helm/bigfleet-web-dashboard
