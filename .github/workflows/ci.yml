name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: go build + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: bigfleet-web-dashboard
      # go.mod has `replace github.com/intUnderflow/bigfleet => ../bigfleet`
      # so the in-tree proto + grpcutil packages must resolve from a sibling
      # checkout. Pull bigfleet@main alongside the dashboard.
      - uses: actions/checkout@v7
        with:
          repository: intUnderflow/bigfleet
          path: bigfleet
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bigfleet-web-dashboard/go.sum
      - working-directory: bigfleet-web-dashboard
        run: go mod download
      - working-directory: bigfleet-web-dashboard
        run: go build ./...
      # Build golangci-lint from source with this job's Go toolchain rather
      # than golangci-lint-action's prebuilt binary: the release binary is
      # compiled with an older Go and refuses to lint a module targeting a
      # newer Go ("Go language version ... lower than the targeted Go
      # version"). This mirrors bigfleet's Makefile.
      - name: golangci-lint
        working-directory: bigfleet-web-dashboard
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          golangci-lint run ./...
      - working-directory: bigfleet-web-dashboard
        run: go test -race ./...

  ui:
    name: ui lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - working-directory: ui
        run: npm ci || npm install
      - working-directory: ui
        run: npm run lint
      - working-directory: ui
        run: npm run typecheck
      - working-directory: ui
        run: npm run test
      - working-directory: ui
        run: npm run build

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0
      - run: helm lint deploy/helm/bigfleet-web-dashboard
