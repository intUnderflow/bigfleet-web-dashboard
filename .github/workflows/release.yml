name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  image:
    name: build + push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      # Pin the bigfleet revision the image is built against (the go.mod
      # `replace => ../bigfleet` clone) so release images are reproducible
      # instead of tracking whatever bigfleet main happened to be at build
      # time. Bump BIGFLEET_REF deliberately in its own PR.
      - id: bigfleet-ref
        run: echo "ref=$(cat BIGFLEET_REF)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/intunderflow/bigfleet-web-dashboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BIGFLEET_REF=${{ steps.bigfleet-ref.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: package + push helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0
      - name: helm registry login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: pin chart version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd deploy/helm/bigfleet-web-dashboard
          sed -i "s/^version: .*/version: ${VERSION}/" Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" Chart.yaml
          cat Chart.yaml
      - run: helm lint deploy/helm/bigfleet-web-dashboard
      - name: package
        run: helm package deploy/helm/bigfleet-web-dashboard -d /tmp
      - name: push
        run: helm push /tmp/bigfleet-web-dashboard-*.tgz oci://ghcr.io/intunderflow/charts
